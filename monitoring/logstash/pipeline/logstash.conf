input {
  beats {
    port => 5044
  }
}

filter {
  # Parse JSON-structured application logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "app"
    }
    
    # Promote key fields to the root level for easier Kibana dashboarding
    if [app][level] {
      mutate {
        add_field => { "log_level" => "%{[app][level]}" }
      }
    }
    if [app][endpoint] {
      mutate {
        add_field => { "endpoint" => "%{[app][endpoint]}" }
      }
    }
    if [app][response_time_ms] {
      mutate {
        add_field => { "response_time_ms" => "%{[app][response_time_ms]}" }
      }
      mutate {
        convert => { "response_time_ms" => "float" }
      }
    }
    if [app][status_code] {
      mutate {
        add_field => { "status_code" => "%{[app][status_code]}" }
      }
      mutate {
        convert => { "status_code" => "integer" }
      }
    }
    if [app][similarity_score] {
      mutate {
        add_field => { "similarity_score" => "%{[app][similarity_score]}" }
      }
      mutate {
        convert => { "similarity_score" => "float" }
      }
    }
    if [app][is_paraphrase] {
      mutate {
        add_field => { "is_paraphrase" => "%{[app][is_paraphrase]}" }
      }
    }
  }

  # Tag by Kubernetes pod labels
  if [kubernetes][labels][app] {
    mutate {
      add_field => { "service_name" => "%{[kubernetes][labels][app]}" }
    }
  }

  # Drop noisy health-check logs to reduce index volume
  if [app][endpoint] == "/" and [app][event] == "request_completed" {
    drop { }
  }

  # Add processing timestamp
  mutate {
    add_field => { "processed_at" => "%{@timestamp}" }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "semantic-logs-%{+YYYY.MM.dd}"
    manage_template => true
    template_name => "semantic-logs"
    template_overwrite => true
  }

  # Stdout for debugging (remove in production)
  stdout {
    codec => rubydebug
  }
}
