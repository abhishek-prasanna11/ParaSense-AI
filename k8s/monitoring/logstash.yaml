apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  labels:
    app: logstash
    component: monitoring
data:
  logstash.conf: |
    input {
      beats {
        port => 5044
      }
    }

    filter {
      if [message] =~ /^\{/ {
        json {
          source => "message"
          target => "app"
        }
        # Fix mapping conflict: Elasticsearch expects [app][service] and [app][event] to be objects in ECS.
        # Our python logger sends strings. We rename them here before indexing.
        mutate {
          rename => { 
            "[app][service]" => "[app][logger_service]" 
            "[app][event]" => "[app][logger_event]"
          }
        }
        if [app][level] {
          mutate { add_field => { "log_level" => "%{[app][level]}" } }
        }
        if [app][endpoint] {
          mutate { add_field => { "endpoint" => "%{[app][endpoint]}" } }
        }
        if [app][response_time_ms] {
          mutate { add_field => { "response_time_ms" => "%{[app][response_time_ms]}" } }
          mutate { convert => { "response_time_ms" => "float" } }
        }
        if [app][status_code] {
          mutate { add_field => { "status_code" => "%{[app][status_code]}" } }
          mutate { convert => { "status_code" => "integer" } }
        }
        if [app][similarity_score] {
          mutate { add_field => { "similarity_score" => "%{[app][similarity_score]}" } }
          mutate { convert => { "similarity_score" => "float" } }
        }
      }

      if [kubernetes][labels][app] {
        mutate { add_field => { "service_name" => "%{[kubernetes][labels][app]}" } }
      }

      # Drop noisy health-check logs
      if [app][endpoint] == "/" and [app][logger_event] == "request_completed" {
        drop { }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "semantic-logs-%{+YYYY.MM.dd}"
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  labels:
    app: logstash
    component: monitoring
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]
    path.config: /usr/share/logstash/pipeline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  labels:
    app: logstash
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
        component: monitoring
    spec:
      containers:
      - name: logstash
        image: docker.elastic.co/logstash/logstash:8.13.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5044
          name: beats
        - containerPort: 9600
          name: monitoring
        env:
        - name: LS_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        volumeMounts:
        - name: pipeline
          mountPath: /usr/share/logstash/pipeline/logstash.conf
          subPath: logstash.conf
        - name: config
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
      volumes:
      - name: pipeline
        configMap:
          name: logstash-pipeline
      - name: config
        configMap:
          name: logstash-config
---
apiVersion: v1
kind: Service
metadata:
  name: logstash
  labels:
    app: logstash
    component: monitoring
spec:
  type: ClusterIP
  ports:
  - port: 5044
    targetPort: 5044
    name: beats
  - port: 9600
    targetPort: 9600
    name: monitoring
  selector:
    app: logstash
